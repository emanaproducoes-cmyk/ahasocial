<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AHA Social Planning — Conectando Instagram...</title>
<style>
  body { font-family:'DM Sans',sans-serif; background:#F8FAFC; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .card { background:#fff; border-radius:14px; padding:40px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.1); max-width:420px; width:90%; }
  .logo { font-size:36px; font-weight:900; color:#F97316; letter-spacing:-2px; margin-bottom:6px; }
  .sub  { font-size:11px; letter-spacing:3px; color:#94A3B8; text-transform:uppercase; margin-bottom:28px; }
  .icon { font-size:48px; margin-bottom:16px; }
  h2   { font-size:18px; font-weight:700; color:#0F172A; margin-bottom:8px; }
  p    { font-size:13px; color:#64748B; line-height:1.6; }
  .spinner { width:32px; height:32px; border:3px solid #E2E8F0; border-top-color:#F97316; border-radius:50%; animation:spin .8s linear infinite; margin:20px auto; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .success { color:#16A34A; } .error { color:#DC2626; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">AHA</div>
  <div class="sub">Social Planning</div>
  <div class="icon" id="icon">⏳</div>
  <h2 id="title">Conectando Instagram...</h2>
  <p id="msg">Aguarde enquanto processamos o código de autorização.</p>
  <div class="spinner" id="spinner"></div>
</div>

<script>
(function() {
  const params  = new URLSearchParams(window.location.search);
  const code    = params.get('code');
  const error   = params.get('error');
  const state   = params.get('state');
  const icon    = document.getElementById('icon');
  const title   = document.getElementById('title');
  const msg     = document.getElementById('msg');
  const spinner = document.getElementById('spinner');

  if (error) {
    icon.textContent  = '❌';
    title.textContent = 'Autorização negada';
    msg.textContent   = 'O acesso ao Instagram foi negado. Feche esta aba e tente novamente.';
    title.classList.add('error');
    spinner.style.display = 'none';
    return;
  }

  if (!code) {
    icon.textContent  = '⚠️';
    title.textContent = 'Código não encontrado';
    msg.textContent   = 'Parâmetro "code" não recebido. Tente o processo novamente.';
    spinner.style.display = 'none';
    return;
  }

  // Envia o código para a janela pai (app principal)
  if (window.opener) {
    window.opener.postMessage({
      type: 'instagram_oauth_callback',
      code: code,
      state: state
    }, window.location.origin);
    icon.textContent  = '✅';
    title.textContent = 'Instagram conectado!';
    title.classList.add('success');
    msg.textContent   = 'Conta conectada com sucesso. Esta aba será fechada automaticamente.';
    spinner.style.display = 'none';
    setTimeout(() => window.close(), 2000);
  } else {
    // Fallback: redireciona para o app com o código
    const appUrl = window.location.origin + '/?ig_code=' + encodeURIComponent(code) + '&ig_state=' + encodeURIComponent(state||'');
    window.location.href = appUrl;
  }
})();
</script>
</body>
</html>
