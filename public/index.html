<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>AHA Social Planning — Gestão de Redes Sociais</title>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<div id="loginPage">
  <div class="login-left">
    <img src="assets/banner.png" alt="AHA Social Planning" class="login-banner-img"/>
    <div class="login-brand">
      <div class="login-logo-text">AHA</div>
      <div class="login-logo-tagline">Social Planning</div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-form-box">
        <h2>Bem-vindo</h2>
        <button class="btn-login" onclick="AUTH.loginGoogle()">Entrar com Google</button>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="aha-mark">AHA</div>
      <div class="social-mark">Social Planning</div>
    </div>
    </nav>
  <main class="main-content">
    <header class="topbar">
      <h1 id="pageTitle">Dashboard</h1>
      <div id="sideUserName"></div>
    </header>
    <div id="sec-dashboard" class="page-section active"></div>
  </main>
</div>

<div id="modalAgend" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">Novo Post</h2>
    <form id="formAgend" onsubmit="event.preventDefault(); savePost();">
      <input type="text" id="ag-title" placeholder="Título" required>
      <input type="datetime-local" id="ag-date" required>
      <textarea id="ag-caption" placeholder="Legenda"></textarea>
      <input type="text" id="ag-campaign" placeholder="Campanha">
      <button type="submit">Salvar</button>
      <button type="button" onclick="closeModal('modalAgend')">Cancelar</button>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
