<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>AHA Social Planning — Gestão de Redes Sociais</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>"/>
    <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

    <div id="loginPage">
        <div class="login-left">
            <img src="assets/banner.png" alt="AHA Social Planning" class="login-banner-img"/>
            <div class="login-banner-overlay"></div>
            <div class="login-left-content">
                <div class="login-brand">
                    <div class="login-logo-text">AHA</div>
                    <div class="login-logo-tagline">Social Planning</div>
                </div>
                <div class="login-tagline">Planeje, aprove e publique com inteligência.</div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form-box">
                <h2>Bem-vindo de volta</h2>
                <p>Acesse sua conta para gerenciar seus agendamentos.</p>
                <button onclick="loginGoogle()" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google">
                    Entrar com Google
                </button>
            </div>
        </div>
    </div>

    <div id="mainApp" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-text">AHA</span>
            </div>
            <nav class="menu">
                <a href="#" class="menu-item active" onclick="showPage('dashboard')">📊 Dashboard</a>
                <a href="#" class="menu-item" onclick="openPostModal()">➕ Novo Post</a>
                <a href="#" class="menu-item" onclick="AUTH.logout()">🚪 Sair</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="user-profile">
                    <span id="userName">Carregando...</span>
                </div>
            </header>

            <section id="dashboardPage" class="content-section">
                <div class="section-header">
                    <h3>Agendamentos Recentes</h3>
                    <div class="view-toggle">
                        <button class="vt-btn active">Grade</button>
                    </div>
                </div>
                
                <div id="agend-cards" class="cards-grid">
                    <div class="loading-state">Buscando agendamentos...</div>
                </div>
            </section>
        </main>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Novo Agendamento</h2>
                <button class="close-btn" onclick="closeModal('postModal')">&times;</button>
            </div>
            
            <form id="postForm" onsubmit="event.preventDefault(); savePost();">
                <div class="form-group">
                    <label for="post-title">Título do Post</label>
                    <input type="text" id="post-title" placeholder="Ex: Promoção de Verão" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="post-date">Data e Hora</label>
                        <input type="datetime-local" id="post-date" required>
                    </div>
                    <div class="form-group">
                        <label for="post-campaign">Campanha</label>
                        <input type="text" id="post-campaign" placeholder="Ex: Black Friday">
                    </div>
                </div>

                <div class="form-group">
                    <label for="post-desc">Legenda / Descrição</label>
                    <textarea id="post-desc" rows="4" placeholder="Escreva a legenda aqui..."></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('postModal')">Cancelar</button>
                    <button type="submit" id="btnSavePost" class="btn-primary">Salvar Agendamento</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">
        <div class="toast-content">
            <span id="toast-title">Mensagem</span>
        </div>
        <div class="toast-line"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    
    <script src="js/app.js"></script>

    <script>
        // Pequeno script de UI para alternar entre login e app (caso não esteja no app.js)
        function showPage(pageId) {
            const isLogin = pageId === 'login';
            document.getElementById('loginPage').style.display = isLogin ? 'flex' : 'none';
            document.getElementById('mainApp').style.display = isLogin ? 'none' : 'flex';
        }
    </script>
</body>
</html>
