<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>AHA Social Planning — Gestão de Redes Sociais</title>
    <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<div id="loginPage" style="display:none;">
    <div class="login-left">
        <img src="assets/banner.png" alt="AHA" class="login-banner-img"/>
        <div class="login-brand">
            <div class="login-logo-text">AHA</div>
            <div class="login-logo-tagline">Social Planning</div>
        </div>
    </div>
    <div class="login-right">
        <button onclick="AUTH.loginGoogle()" class="btn-login">Entrar com Google</button>
    </div>
</div>

<div id="app" style="display:none;">
    <nav class="sidebar">
        <div class="sidebar-logo">
            <div class="aha-mark">AHA</div>
            <div class="social-mark">Social Planning</div>
        </div>
        <div class="nav-section">
            <div class="nav-item active" onclick="showPage('dashboard', this)">Dashboard</div>
            <div class="nav-item" onclick="showPage('agendamentos', this)">Agendamentos</div>
        </div>
        <div class="sidebar-bottom">
            <div id="sideUserName">Usuário</div>
            <button onclick="AUTH.logout()">Sair</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <h1 id="pageTitle">Dashboard</h1>
        </header>
        
        <div id="sec-dashboard" class="page-section active">
            <div id="agend-cards" class="cards-grid"></div>
        </div>
    </main>
</div>

<div id="modalAgend" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Novo Agendamento</h2>
        <form id="formAgend" onsubmit="event.preventDefault(); savePost();">
            <input type="text" id="ag-title" placeholder="Título" required>
            <input type="datetime-local" id="ag-date" required>
            <textarea id="ag-caption" placeholder="Legenda"></textarea>
            <input type="text" id="ag-campaign" placeholder="Campanha">
            <div class="modal-footer">
                <button type="button" onclick="closeModal('modalAgend')">Cancelar</button>
                <button type="submit">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
